name: Containerize application

on:
  push:
    branches:
      - main
    paths:
      - 'src/'
  workflow_dispatch:


permissions:
  packages: write
  contents: read


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'corretto'
          cache: 'maven'

      - name: Build with Maven Wrapper
        run: ./mvnw --batch-mode spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName="containers.github.bhs-world.com/devops/lunch-learn:latest"

      - name: Show images
        run: docker images

#      - name: Login to GitHub Container registry
