name: Build and test Spring PetClinic

on:
  workflow_dispatch:

#  push:
#    branches:
#      - main


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'corretto'
          cache: 'maven'

      - name: Build with Maven Wrapper
        run: ./mvnw spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=springio/gs-spring-boot-docker


      - name: Run tests
        run: docker images
